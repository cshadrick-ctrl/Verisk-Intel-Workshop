<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Intel Positioning Workshop | Ammunition × Verisk</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#FF5400;--or-dim:rgba(255,84,0,0.1);--or-mid:rgba(255,84,0,0.25);
  --vk:#1B6EC2;--vk-dark:#003087;--vk-dim:rgba(27,110,194,0.12);--vk-mid:rgba(27,110,194,0.28);
  --bg:#07090F;--s1:#141828;--s2:#1C2235;--s3:#252B40;
  --bd:#2A3248;--bd2:#384060;
  --t:#EEF2F8;--tm:#C8D0DC;--td:#8C96A8;--tx:#6B7585;
  --gold:#FFB800;--purple:#9B8AFB;--green:#00C48C;--blue:#3B9EFF;--red:#FF4D4D;
  --rad:8px;--radl:12px;
  --f:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--f);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.hd{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;position:sticky;top:0;z-index:200}
.hd-brand{display:flex;align-items:center;gap:14px}
.hd-ammo{font-size:11px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;color:var(--or)}
.hd-vk{font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;color:var(--vk)}
.hd-sep{width:1px;height:16px;background:var(--bd2)}
.hd-title{display:none}
.hd-mid{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:160px}
.s-lbl{font-size:13px;font-weight:700;color:var(--t);letter-spacing:0.02em}
.s-prog-bar{width:160px;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden}
.s-prog-fill{height:100%;background:var(--or);border-radius:2px;transition:width .3s}
.hd-r{display:flex;align-items:center;gap:12px}
.hd-btn{padding:6px 14px;border-radius:var(--rad);border:1px solid var(--bd2);background:transparent;color:var(--td);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--f)}
.hd-btn:hover{background:var(--s2);color:var(--t)}
.hd-btn.on{border-color:var(--or);color:var(--or);background:var(--or-dim)}
.t-time{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--t)}
.t-time.warn{color:var(--gold)}.t-time.crit{color:var(--red)}
.timer-wrap{display:flex;align-items:center;gap:10px}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.ov-box{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--radl);padding:40px 48px;max-width:580px;width:92%}
.ov-eye{font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--or);margin-bottom:10px}
.ov-h1{font-size:24px;font-weight:900;letter-spacing:-0.02em;margin-bottom:12px}
.ov-body{font-size:14px;color:var(--tm);line-height:1.65;margin-bottom:22px}
.ov-body.challenge{font-size:17px;font-style:italic;color:var(--t);line-height:1.65;padding:16px 20px;background:var(--s2);border-radius:var(--rad);border-left:3px solid var(--or);margin-bottom:10px}
.ov-note{font-size:11px;color:var(--td);margin-bottom:20px}
.ov-stars{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.ov-star-item{display:flex;gap:10px;padding:9px 13px;background:var(--s2);border-radius:var(--rad)}
.ov-star-lbl{font-size:9px;font-weight:800;color:var(--or);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;padding-top:2px}
.ov-star-txt{font-size:12px;color:var(--t);line-height:1.5}
.ov-acts{display:flex;gap:8px;justify-content:flex-end}
.ov-btn{padding:9px 22px;border-radius:var(--rad);border:none;font-size:12px;font-weight:800;cursor:pointer;font-family:var(--f)}
.ov-btn.prim{background:var(--or);color:#fff}
.ov-btn.sec{background:var(--s3);color:var(--tm);border:1px solid var(--bd2)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;position:relative}

/* WELCOME */
.w-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 40px;text-align:center;position:relative;overflow:hidden}
.w-bg{position:absolute;font-size:240px;font-weight:900;letter-spacing:-0.05em;color:rgba(255,84,0,0.025);user-select:none;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;line-height:1}
.cb-lockup{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.cb-mark{display:flex;flex-direction:column;align-items:center;gap:3px}
.cb-name{font-size:10px;font-weight:800;letter-spacing:0.26em;text-transform:uppercase}
.cb-name.ammo{color:var(--or)}.cb-name.verisk{color:var(--vk)}
.cb-rule{width:32px;height:2px;border-radius:1px}
.cb-rule.ammo{background:var(--or)}.cb-rule.verisk{background:var(--vk)}
.cb-x{font-size:16px;font-weight:300;color:var(--td);padding:0 2px;line-height:1}
.w-intel{font-size:12px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;color:var(--vk);margin-bottom:8px}
.w-h1{font-size:52px;font-weight:900;letter-spacing:-0.03em;line-height:1.05;margin-bottom:8px}
.w-h1 em{font-style:italic;color:var(--or)}
.w-workshop{font-size:13px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--td);margin-bottom:28px}
.w-sub{font-size:16px;color:var(--tm);max-width:460px;line-height:1.7;margin-bottom:36px}
.w-meta{display:flex;gap:24px;margin-bottom:32px;color:var(--td);font-size:12px;flex-wrap:wrap;justify-content:center}
.btn-start{padding:13px 36px;background:var(--or);color:#fff;font-size:14px;font-weight:800;border:none;border-radius:var(--rad);cursor:pointer;font-family:var(--f)}
.btn-start:hover{background:#e84800;transform:translateY(-1px)}
.w-timeline{display:flex;max-width:980px;width:100%;margin-top:44px;border-radius:var(--radl);overflow:hidden;border:1px solid var(--bd)}
.tl-item{flex:1;padding:18px 14px 16px;border-right:1px solid var(--bd);background:var(--s1);display:flex;flex-direction:column;gap:4px;min-width:0}
.tl-item:last-child{border-right:none}
.tl-item.reads{background:rgba(255,84,0,0.07);border-color:rgba(255,84,0,0.18)}
.tl-item.brk{background:var(--s2)}
.tl-time{font-size:12px;font-weight:800}
.tl-time.or{color:var(--or)}.tl-time.vk{color:var(--vk)}.tl-time.dim{color:var(--td)}
.tl-title{font-size:12px;font-weight:700;color:var(--t);line-height:1.25}
.tl-dur{font-size:10px;color:var(--td);margin-top:2px}
.w-prework{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:980px;width:100%;margin-top:14px}
.pw-item{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);padding:16px 18px;display:flex;gap:12px;align-items:flex-start;text-align:left}
.pw-num{width:22px;height:22px;border-radius:50%;background:var(--or-dim);border:1px solid var(--or-mid);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--or);flex-shrink:0;margin-top:2px}
.pw-txt{font-size:13px;color:var(--tm);line-height:1.55}
.pw-txt strong{color:var(--t);display:block;margin-bottom:2px}

/* FRAMING — PURPOSE */
.fr-purpose{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto;gap:24px;padding:52px 64px;overflow-y:auto}
.fr-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);padding:28px 32px}
.fr-lbl{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--td);margin-bottom:10px}
.fr-txt{font-size:15px;color:var(--t);line-height:1.7}
.fr-anchor-card{background:rgba(27,110,194,0.07);border:1px solid var(--vk-mid);border-radius:var(--radl);padding:28px 32px}
.fr-anchor-date{font-size:32px;font-weight:900;letter-spacing:-0.02em;color:var(--vk);line-height:1;margin-bottom:8px}
.fr-p-list{display:flex;flex-direction:column;gap:8px}
.fr-p-row{display:flex;align-items:center;gap:8px;font-size:13px}
.fr-p-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fr-rules{grid-column:1/-1;background:var(--or-dim);border:1px solid var(--or-mid);border-radius:var(--radl);padding:18px 24px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.fr-rules-lbl{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--or);white-space:nowrap}
.fr-rule{font-size:13px;color:var(--t);display:flex;align-items:center;gap:7px}
.r-dot{width:4px;height:4px;border-radius:50%;background:var(--or);flex-shrink:0}

/* FRAMING — LANDSCAPE */
.fr-landscape{flex:1;padding:44px 56px;overflow-y:auto}
.screen-eye{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--or);margin-bottom:12px}
.screen-h1{font-size:38px;font-weight:900;letter-spacing:-0.02em;line-height:1.1;margin-bottom:8px}
.screen-sub{font-size:15px;color:var(--tm);line-height:1.65;margin-bottom:28px;max-width:640px}
.comp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.comp-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);padding:22px 20px;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.comp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.comp-name{font-size:15px;font-weight:800;color:var(--t)}
.comp-owns{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--td)}
.comp-claim{font-size:12px;color:var(--tm);line-height:1.6;font-style:italic;flex:1}
.comp-gap-lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.comp-gap{font-size:12px;color:var(--t);font-weight:600}

/* FRAMING — HYPOTHESIS */
.fr-hyp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:56px 80px;text-align:center;overflow-y:auto}
.hyp-eye{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--or);margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:center}
.hyp-h1{font-size:30px;font-weight:900;letter-spacing:-0.02em;margin-bottom:10px}
.hyp-lbl{font-size:14px;color:var(--tm);margin-bottom:20px;line-height:1.55}
.hyp-ta{width:100%;max-width:760px;min-height:160px;background:var(--s1);border:1px solid var(--bd2);border-radius:var(--radl);padding:22px 26px;color:var(--t);font-size:18px;font-weight:700;font-family:var(--f);line-height:1.65;resize:vertical;outline:none;text-align:left;overflow:hidden}
.hyp-ta::placeholder{color:var(--td);font-weight:400}
.hyp-ta:focus{border-color:var(--or-mid)}
.hyp-prompt{font-size:14px;color:var(--or);font-style:italic;margin-top:16px;max-width:560px}

/* STIMULUS — WHITE SPACE */
.stim-ws{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px;text-align:center;position:relative;overflow:hidden}
.stim-ws-bg{position:absolute;font-size:200px;font-weight:900;letter-spacing:-0.05em;color:rgba(27,110,194,0.04);user-select:none;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;line-height:1}
.ws-eye{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--vk);margin-bottom:16px}
.ws-word{font-size:88px;font-weight:900;letter-spacing:-0.04em;color:var(--vk);line-height:1;margin-bottom:24px}
.ws-divider{width:64px;height:3px;background:var(--vk);border-radius:2px;margin:0 auto 24px}
.ws-body{font-size:18px;color:var(--tm);line-height:1.75;max-width:680px;margin-bottom:32px}
.ws-body strong{color:var(--t)}
.ws-territory{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:880px;width:100%}
.ws-comp{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);padding:12px 14px;text-align:left}
.ws-comp-name{font-size:11px;font-weight:800;color:var(--tm);margin-bottom:3px}
.ws-comp-claim{font-size:11px;color:var(--td)}

/* STIMULUS — TRENDS */
.stim-trends{flex:1;padding:36px 44px;overflow-y:auto}
.trend-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.trend-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s}
.trend-card.voted-urgent{border-color:var(--or);background:rgba(255,84,0,0.04)}
.trend-card.voted-own{border-color:var(--green);background:rgba(0,196,140,0.04)}
.trend-card.voted-both{border-color:var(--gold);background:rgba(255,184,0,0.04)}
.trend-card-hd{padding:14px 16px 12px;border-bottom:1px solid var(--bd)}
.trend-num{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--td);margin-bottom:6px}
.trend-title{font-size:14px;font-weight:800;color:var(--t);line-height:1.3}
.trend-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:12px}
.trend-evidence{font-size:12px;color:var(--tm);line-height:1.6}
.trend-prov{font-size:12px;color:var(--or);font-style:italic;line-height:1.55;padding-top:10px;border-top:1px solid var(--bd)}
.trend-votes{display:flex;gap:6px;padding:12px 16px;border-top:1px solid var(--bd)}
.tvote{flex:1;padding:7px 4px;border-radius:var(--rad);border:1px solid var(--bd2);background:transparent;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--f);transition:all .2s;color:var(--td);text-align:center;line-height:1.3}
.tvote.urgent.act{border-color:var(--or);color:var(--or);background:var(--or-dim)}
.tvote.own.act{border-color:var(--green);color:var(--green);background:rgba(0,196,140,0.08)}
.vote-tally{background:var(--s2);border:1px solid var(--bd);border-radius:var(--radl);padding:14px 20px;display:flex;gap:24px;align-items:center}
.tally-lbl{font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--td);margin-bottom:4px}
.tally-val{font-size:13px;font-weight:700;color:var(--t)}
.tally-val.empty{color:var(--td);font-weight:400;font-style:italic}
.tally-div{width:1px;height:36px;background:var(--bd2)}

/* DISCUSSION SCREEN */
.disc-screen{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
.disc-left{padding:64px 56px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--bd)}
.disc-tag{font-size:10px;font-weight:800;letter-spacing:0.22em;text-transform:uppercase;color:var(--or);margin-bottom:16px}
.disc-h1{font-size:40px;font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:16px}
.disc-sub{font-size:16px;color:var(--tm);line-height:1.7;margin-bottom:32px}
.disc-prompts{display:flex;flex-direction:column;gap:10px}
.disc-persona-prompt{background:var(--s2);border-radius:var(--rad);padding:14px 16px}
.disc-pp-name{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.disc-pp-q{font-size:14px;color:var(--t);line-height:1.6;font-style:italic}
.disc-right{padding:56px 52px;display:flex;flex-direction:column;justify-content:center;gap:18px}
.disc-q{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);padding:22px 24px}
.disc-q-num{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--td);margin-bottom:8px}
.disc-q-lbl{font-size:18px;font-weight:700;color:var(--t);line-height:1.35;margin-bottom:6px}
.disc-q-hint{font-size:13px;color:var(--tm);line-height:1.55}

/* CAPTURE SCREEN (full-width, simplified) */
.cap-screen{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:40px 56px}
.cap-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px}
.cap-tag{font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--or)}
.p-tabs{display:flex;gap:8px;flex-wrap:wrap}
.p-tab{padding:10px 16px;border-radius:var(--rad);border:1px solid var(--bd);background:var(--s1);cursor:pointer;transition:all .2s;font-family:var(--f)}
.p-tab-nm{font-size:11px;font-weight:700;color:var(--t);margin-bottom:1px;display:flex;justify-content:space-between;gap:8px}
.p-tab-rl{font-size:10px;color:var(--td)}
.add-p-btn{padding:8px 11px;border-radius:var(--rad);border:1px dashed var(--bd2);background:transparent;color:var(--td);font-size:15px;cursor:pointer;transition:all .2s;font-family:var(--f)}
.add-p-btn:hover{border-color:var(--or);color:var(--or);background:var(--or-dim)}
.add-p-form{display:none;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.add-p-form.open{display:flex}
.add-p-in{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rad);padding:7px 11px;color:var(--t);font-size:12px;font-family:var(--f);outline:none}
.add-p-in::placeholder{color:var(--td)}
.add-p-in:focus{border-color:rgba(255,84,0,0.5)}
.add-p-save{padding:7px 14px;background:var(--or);border:none;border-radius:var(--rad);color:#fff;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--f)}
.add-p-cancel{padding:7px 10px;background:transparent;border:1px solid var(--bd2);border-radius:var(--rad);color:var(--tm);font-size:11px;cursor:pointer;font-family:var(--f)}
.cap-persona-hd{margin-bottom:20px;padding-top:4px}
.cap-pname{font-size:20px;font-weight:900;margin-bottom:2px}
.cap-prole{font-size:12px;color:var(--tm)}
.cap-prompt{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rad);border-left-width:3px;padding:18px 22px;font-size:15px;color:var(--t);line-height:1.7;font-style:italic;margin-bottom:28px}
.cap-fields{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.cap-field{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radl);overflow:hidden;transition:border-color .2s}
.cap-field:focus-within{border-color:var(--bd2)}
.cap-field.starred{border-color:rgba(255,184,0,0.4);background:rgba(255,184,0,0.03)}
.cap-flbl{padding:12px 16px 10px;font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--tm);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.f-num{width:16px;height:16px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--td);flex-shrink:0}
.f-lbl-txt{flex:1}
.star-btn{background:none;border:none;cursor:pointer;color:var(--td);font-size:13px;padding:0;line-height:1;transition:color .2s}
.star-btn:hover{color:var(--gold)}.star-btn.on{color:var(--gold)}
.cap-ta{width:100%;min-height:140px;background:transparent;border:none;padding:14px 16px;color:var(--t);font-size:14px;font-family:var(--f);line-height:1.7;resize:vertical;outline:none}
.cap-ta::placeholder{color:var(--tx)}
.cap-extras{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
.belief-field{background:rgba(155,138,251,0.06);border:1px solid rgba(155,138,251,0.2);border-radius:var(--radl);overflow:hidden}
.belief-hd{padding:8px 14px 6px;font-size:10px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--purple);border-bottom:1px solid rgba(155,138,251,0.15);display:flex;align-items:center;gap:7px}
.belief-ta{width:100%;min-height:64px;background:transparent;border:none;padding:10px 14px;color:var(--t);font-size:13px;font-family:var(--f);line-height:1.6;resize:vertical;outline:none}
.belief-ta::placeholder{color:rgba(155,138,251,0.3)}

<script>
// ── PERSONAS ─────────────────────────────────────────────────────────────────

];

// ── COMPETITOR DATA ───────────────────────────────────────────────────────────
const COMP=[
  {name:'FRISS',      color:'#4A9EFF', owns:'Trust automation',        claim:"Industry's first Trust Automation platform for P&C Insurers. Automates risk assessment behind every customer interaction across underwriting, claims and SIU.", gap:'Automated triage at point of claim. No investigation depth. No cross-LOB connected intelligence.'},

  cs:{id:'cs',tag:'01 — Current State',h1:'How fraud investigation works today.',
    sub:'Real workflows. Real friction. What do people currently believe about fraud that shapes how they work — and what needs to shift?',
    qs:[
      {id:'q1',lbl:'Daily workflow & friction',ph:'How does this role manage their day? Where does fraud intelligence currently live? What manual work is unavoidable?'},

    prompts:{hf:'"Walk me through how you manage your fraud operation today. Where does the intelligence live? How do you know what your team knows — and doesn\'t?"',siu:'"Take me through a complex fraud investigation from start to finish. Where do you lose time? Where do you most second-guess your own work?"',cd:'"How do you currently get visibility into fraud exposure across lines of business? What don\'t you know that worries you?"',fcr:'"What\'s your view of the fraud landscape right now — organised, opportunistic, and internal risk? Where are the biggest blindspots?"'},

function initP(p){

    const sid=cap.id;

    if(!priorities[sid])priorities[sid]={};

    if(!verbatim[sid])verbatim[sid]={};
    if(!verbatim[sid][p.id])verbatim[sid][p.id]='';
  });
  if(!N.syn)N.syn={};
  if(!N.syn[p.id])N.syn[p.id]='';
}

  const sns=localStorage.getItem('vi_ns');if(sns)try{Object.assign(N.nextsteps,JSON.parse(sns))}catch(e){}
  const spa=localStorage.getItem('vi_pa');if(spa){pa=parseInt(spa)||0;if(pa>=P.length)pa=0}
}catch(e){}

function persist(){
  const snapshot=JSON.stringify({N,priorities,verbatim,cur,pa});
  try{
    localStorage.setItem('vi_n',JSON.stringify(N));
    localStorage.setItem('vi_pr',JSON.stringify(priorities));
    localStorage.setItem('vi_vb',JSON.stringify(verbatim));
    localStorage.setItem('vi_c',cur);
    localStorage.setItem('vi_pa',pa);
    if(N.nextsteps)localStorage.setItem('vi_ns',JSON.stringify(N.nextsteps));
    localStorage.setItem('vi_ts',Date.now());
    // sessionStorage as a second backup layer
    sessionStorage.setItem('vi_backup',snapshot);
  }catch(e){console.warn('Save failed:',e)}
  const el=document.getElementById('save-status');
  if(el){
    const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    el.textContent='Saved '+t;
    el.style.color='var(--green)';
    setTimeout(()=>{if(el)el.style.color='var(--td)'},2000);
  }
}

}

}

function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px'}
function bindAll(){
  document.querySelectorAll('textarea').forEach(ta=>{autoResize(ta);ta.addEventListener('input',()=>autoResize(ta))});
  document.querySelectorAll('.cap-ta').forEach(t=>t.addEventListener('input',onNote));
  document.querySelectorAll('.verbatim-ta').forEach(t=>t.addEventListener('input',onVerbatim));
  document.querySelectorAll('.belief-ta').forEach(t=>t.addEventListener('input',onBelief));
  document.querySelectorAll('.enemy-ta').forEach(t=>t.addEventListener('input',e=>{N['wr_enemy']=e.target.value;persist()}));

  document.querySelectorAll('.ot-ta').forEach(t=>t.addEventListener('input',e=>{N.onething=e.target.value;persist()}));
  document.querySelectorAll('.hyp-ta').forEach(t=>t.addEventListener('input',e=>{N.hyp=e.target.value;persist()}));
  document.querySelectorAll('.pb-frame-ta').forEach((t,i)=>t.addEventListener('input',e=>{N.playback.frames[i]=e.target.value;persist()}));
  const pbr=document.querySelector('.pb-reaction-ta');if(pbr)pbr.addEventListener('input',e=>{N.playback.reaction=e.target.value;persist()});
  const str=document.querySelector('.stim-note-ta');if(str)str.addEventListener('input',e=>{N.stimulus.note=e.target.value;persist()});

}

function rSyn(){
  const capSecs=Object.values(CAPS);
  const signalItems=[];
  const sv=N.stimulus;if(sv?.urgent!=null)signalItems.push({t:'Most urgent shift',v:TRENDS[sv.urgent]?.title});
  if(sv?.own!=null)signalItems.push({t:'Intel can own',v:TRENDS[sv.own]?.title});
  const frames=N.playback?.frames||WH_FRAMES;const votes=N.playback?.votes||[];
  const voteTxt={'this-is':'This is Intel','warmer':'Getting warmer','not-us':'Not us'};
  frames.forEach((f,i)=>{if(votes[i])signalItems.push({t:voteTxt[votes[i]],v:f.slice(0,80)+(f.length>80?'…':'')})});
  const enemyTxt=(N['wr_enemy']||'').trim();
  if(enemyTxt)signalItems.push({t:'The enemy',v:enemyTxt});
  const cards=P.map(p=>{
    const srcClr=p.src==='brief'?'rgba(0,196,140,0.6)':'rgba(155,138,251,0.6)';
    const rows=capSecs.map(cap=>{
      const pn=N[cap.id]?.[p.id]||{};const pr=priorities[cap.id]?.[p.id]||{};const vb=(verbatim[cap.id]?.[p.id]||'').trim();
      const beliefV=(pn['belief']||'').trim();
      const parts=cap.qs.map(q=>{const v=(pn[q.id]||'').trim();return v?{v,starred:pr[q.id]}:null}).filter(Boolean);
      const has=parts.length>0||beliefV;
      if(!has)return`<div class="syn-row"><div class="syn-rl">${cap.tag.split('—')[1]?.trim()||cap.id}</div><div class="syn-ct emp">No notes</div></div>`;
      return`<div class="syn-row"><div class="syn-rl">${cap.tag.split('—')[1]?.trim()||cap.id}</div><div class="syn-ct">${parts.map(pt=>pt.starred?`<div class="syn-star"><span class="syn-star-ic">&#9733;</span><span>${esc(pt.v)}</span></div>`:`<div>${esc(pt.v)}</div>`).join('')}${beliefV?`<div class="syn-belief">&#8596; ${esc(beliefV)}</div>`:''}${vb?`<div class="syn-vb">&#8220; ${esc(vb)} &#8221;</div>`:''}</div></div>`;
    }).join('');
    const sig=N.syn[p.id]||'';
    return`<div class="p-card"><div class="p-card-hd"><div class="p-ind" style="background:${p.c}"></div><div class="p-card-nm" style="color:${p.c}">${p.label}</div><div class="p-card-rl" style="margin-left:auto;margin-right:4px">${p.role}</div><span class="p-src-tag" style="color:${srcClr}">${p.src==='brief'?'from brief':'custom'}</span></div>${rows}<div class="syn-row" style="background:rgba(${p.r},0.05)"><div class="syn-rl" style="color:${p.c}">Signal</div><textarea class="sig-ta cap-ta" data-sid="syn" data-pid="${p.id}" data-qid="" placeholder="[Need] → [what Intel gives them] → [what they can now defend]..." style="color:var(--t)">${esc(sig)}</textarea></div></div>`;
  }).join('');
  return`<div class="syn-screen">
  <div class="syn-hd"><div><h2 class="syn-h1">Positioning signals.</h2><p class="syn-sub">Auto-compiled from all captures. &#9733; = starred. &#8596; = belief shifts. &#8220; = verbatim.</p></div><button class="btn-exp" onclick="exportW()">Export &rarr;</button></div>
  <div class="ot-block"><div class="ot-lbl"><span style="color:var(--vk)">Intel</span> &mdash; The one thing</div><p class="ot-desc">A single sentence. No conjunctions. If it could be said about any B2B product, start again.</p><p class="ot-rule">Test: does it rule something out? Does it make someone uncomfortable? Good.</p><textarea class="ot-ta" placeholder="Verisk Intel is the only [category] that [specific, defensible, uncomfortable truth]...">${esc(N.onething||'')}</textarea></div>
  ${signalItems.length>0?`<div class="syn-signals-block"><div class="syn-sig-lbl">Signals from the session</div><div class="syn-sig-rows">${signalItems.map(x=>`<div class="syn-sig-row"><span class="syn-sig-type">${esc(x.t)}</span><span class="syn-sig-txt">${esc(x.v)}</span></div>`).join('')}</div></div>`:''}
  <div class="p-cards">${cards}</div>
  <div class="cross-block"><div class="cross-lbl">Cross-persona territory</div><p class="cross-desc">What&rsquo;s consistent across all personas? This becomes the platform&rsquo;s core proposition.</p><textarea class="cross-ta" placeholder="The proposition true for every persona: what changes, what&rsquo;s protected, what becomes unnecessary...">${esc(N.cross||'')}</textarea></div>
</div>`;
}

// ── EVENT HANDLERS ────────────────────────────────────────────────────────────
function onNote(e){const t=e.target,sid=t.dataset.sid,pid=t.dataset.pid,qid=t.dataset.qid,v=t.value;if(sid==='syn'){if(!N.syn)N.syn={};N.syn[pid]=v}else if(sid&&pid&&qid){if(!N[sid])N[sid]={};if(!N[sid][pid])N[sid][pid]={};N[sid][pid][qid]=v}persist();updateTabBadges()}
function onVerbatim(e){const t=e.target,sid=t.dataset.sid,pid=t.dataset.pid;if(!verbatim[sid])verbatim[sid]={};verbatim[sid][pid]=t.value;persist()}
function onBelief(e){const t=e.target,sid=t.dataset.sid,pid=t.dataset.pid;if(!N[sid])N[sid]={};if(!N[sid][pid])N[sid][pid]={};N[sid][pid]['belief']=t.value;persist()}

function updateTabBadges(){
  const s=S[cur];if(s.type!=='capture')return;const cap=CAPS[s.capRef];if(!cap)return;
  document.querySelectorAll('.p-tab').forEach((tab,i)=>{
    const px=P[i];if(!px)return;
    const pn=N[cap.id]?.[px.id]||{};
    const filled=Object.values(pn).filter(v=>typeof v==='string'&&v.trim()).length;
    const nm=tab.querySelector('.p-tab-nm');if(!nm)return;
    let badge=tab.querySelector('.tbadge');
    if(filled>0){if(!badge){badge=document.createElement('span');badge.className='tbadge';badge.style.cssText=`font-size:9px;font-weight:800;color:${px.c}`;nm.appendChild(badge)}badge.textContent=`${Math.min(filled,cap.qs.length)}/${cap.qs.length}`}
  });
}

function toggleStar(sid,pid,qid){
  if(!priorities[sid])priorities[sid]={};if(!priorities[sid][pid])priorities[sid][pid]={};
  priorities[sid][pid][qid]=!priorities[sid][pid][qid];
  const el=document.getElementById(`f-${sid}-${pid}-${qid}`);
  const sb=el?.querySelector('.star-btn');
  if(el)el.classList.toggle('starred',priorities[sid][pid][qid]);
  if(sb)sb.classList.toggle('on',priorities[sid][pid][qid]);
  persist();
}

function setPa(i){
  pa=i;persist();
  const s=S[cur];if(s.type!=='capture')return;const cap=CAPS[s.capRef];if(!cap)return;
  const p=P[i];
  document.querySelectorAll('.p-tab').forEach((tab,j)=>{
    const px=P[j];const act=j===i;
    tab.style.borderColor=act?px.c:'rgba(255,255,255,0.07)';tab.style.background=act?`rgba(${px.r},0.09)`:'var(--s1)';
    const nm=tab.querySelector('.p-tab-nm');if(nm)nm.style.color=act?px.c:'var(--t)';
  });
  const pn=document.querySelector('.cap-pname');if(pn){pn.textContent=p.label;pn.style.color=p.c}
  const pr=document.querySelector('.cap-prole');if(pr)pr.textContent=p.role;
  const cp=document.querySelector('.cap-prompt');if(cp){cp.textContent=cap.prompts[p.id]||'';cp.style.borderLeftColor=p.c}
  const cf=document.querySelector('.cap-fields');
  if(cf){
    cf.innerHTML=cap.qs.map((q,j)=>{const v=N[cap.id]?.[p.id]?.[q.id]||'';const starred=priorities[cap.id]?.[p.id]?.[q.id]||false;return`<div class="cap-field${starred?' starred':''}" id="f-${cap.id}-${p.id}-${q.id}"><div class="cap-flbl"><div class="f-num">${j+1}</div><span class="f-lbl-txt">${q.lbl}</span><button class="star-btn${starred?' on':''}" onclick="toggleStar('${cap.id}','${p.id}','${q.id}')">&#9733;</button></div><textarea class="cap-ta" data-sid="${cap.id}" data-pid="${p.id}" data-qid="${q.id}" placeholder="${q.ph}">${esc(v)}</textarea></div>`}).join('');
    cf.querySelectorAll('.cap-ta').forEach(t=>t.addEventListener('input',onNote));
  }
  const bt=document.querySelector('.belief-ta');if(bt){bt.value=N[cap.id]?.[p.id]?.['belief']||'';bt.dataset.sid=cap.id;bt.dataset.pid=p.id;bt.addEventListener('input',onBelief)}
  const vt=document.querySelector('.verbatim-ta');if(vt){vt.value=verbatim[cap.id]?.[p.id]||'';vt.dataset.sid=cap.id;vt.dataset.pid=p.id;vt.addEventListener('input',onVerbatim)}
}

function toggleAddForm(){const f=document.getElementById('add-p-form');if(f){f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('add-p-name')?.focus()}}
function submitAddP(){
  const name=(document.getElementById('add-p-name')?.value||'').trim();const role=(document.getElementById('add-p-role')?.value||'Custom persona').trim();if(!name)return;
  const ci=(P.length-BASE_P.length)%EXTRA_C.length;const col=EXTRA_C[ci]||EXTRA_C[0];
  const np={id:'c_'+Date.now(),label:name,role,c:col.c,r:col.r,src:'custom'};P.push(np);initP(np);
  try{localStorage.setItem('vi_cp',JSON.stringify(P.slice(BASE_P.length)))}catch(e){}
  pa=P.length-1;persist();render();
}

function voteTrend(i,type){
  if(!N.stimulus)N.stimulus={urgent:null,own:null,note:''};
  N.stimulus[type]=N.stimulus[type]===i?null:i;persist();
  TRENDS.forEach((_,j)=>{const el=document.getElementById(`tc-${j}`);if(!el)return;const isU=N.stimulus.urgent===j,isO=N.stimulus.own===j;el.className='trend-card'+(isU&&isO?' voted-both':isU?' voted-urgent':isO?' voted-own':'');el.querySelector('.tvote.urgent')?.classList.toggle('act',isU);el.querySelector('.tvote.own')?.classList.toggle('act',isO)});
  const uv=N.stimulus.urgent,ov=N.stimulus.own;
  const tallies=document.querySelectorAll('.tally-val');
  if(tallies[0]){const t=uv!=null?TRENDS[uv]:null;tallies[0].textContent=t?t.title:'Not voted yet';tallies[0].className='tally-val'+(t?'':' empty')}
  if(tallies[1]){const t=ov!=null?TRENDS[ov]:null;tallies[1].textContent=t?t.title:'Not voted yet';tallies[1].className='tally-val'+(t?'':' empty')}
}

function voteFrame(i,v){
  if(!N.playback)N.playback={frames:[...WH_FRAMES],reaction:'',votes:[null,null,null]};
  N.playback.votes[i]=N.playback.votes[i]===v?null:v;persist();
  document.querySelectorAll('.pb-frame').forEach((el,j)=>{const vote=N.playback.votes[j];el.classList.toggle('selected',vote==='this-is');el.classList.toggle('rejected',vote==='not-us');el.querySelector('.pb-frame-num')?.classList.toggle('sel',vote==='this-is')});

function go(d){const ni=cur+d;if(ni<0||ni>=S.length)return;closeOv();stopT();cur=ni;render();window.scrollTo(0,0)}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function toggleTimer(){if(tRun)stopT();else startT()}
function startT(){if(tRem<=0){const s=S[cur];tRem=(s.dur||10)*60}tRun=true;const b=document.getElementById('t-start');if(b){b.textContent='Pause';b.classList.add('on')}tInt=setInterval(()=>{tRem--;updT();const bt=document.getElementById('brk-t');if(bt)bt.textContent=fmt(tRem);if(tRem<=0)stopT()},1000)}
function stopT(){if(tInt){clearInterval(tInt);tInt=null}tRun=false;const b=document.getElementById('t-start');if(b){b.textContent='Start';b.classList.remove('on')}}
function resetTimer(){stopT();const s=S[cur];tRem=(s.dur||10)*60;updT()}
function updT(){const el=document.getElementById('t-time');if(!el)return;el.textContent=fmt(tRem);el.className='t-time'+(tRem<=300?' warn':'')+(tRem<=60?' crit':'')}
function fmt(sec){const m=Math.floor(Math.max(0,sec)/60);const s=Math.max(0,sec)%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportW(){
  let out=`THE INTEL POSITIONING WORKSHOP\nAmmunition × Verisk International\nMonday 15 June 2026 — Online (8 delegates)\nOutput anchor: VIC London, 3 September 2026\n\n${'═'.repeat(62)}\n\n`;
  if(N.onething?.trim())out+=`THE ONE THING\n${N.onething.trim()}\n\n${'═'.repeat(62)}\n\n`;
  if(N['wr_enemy']?.trim())out+=`THE ENEMY\n${N['wr_enemy'].trim()}\n\n`;
  const sv=N.stimulus;if(sv?.urgent!=null||sv?.own!=null){out+=`MARKET SHIFTS\n`;if(sv.urgent!=null)out+=`  Most urgent: ${TRENDS[sv.urgent]?.title}\n`;if(sv.own!=null)out+=`  Intel can own: ${TRENDS[sv.own]?.title}\n`;if(sv.note?.trim())out+=`  Notes: ${sv.note.trim()}\n`;out+='\n'}
  const frames=N.playback?.frames||[];const votes=N.playback?.votes||[];const voteTxt={'this-is':'This is Intel','warmer':'Getting warmer','not-us':'Not us'};
  const votedFrames=frames.map((f,i)=>votes[i]?{f,v:voteTxt[votes[i]]||votes[i]}:null).filter(Boolean);
  if(votedFrames.length){out+=`READS THE ROOM\n`;votedFrames.forEach(x=>out+=`  [${x.v}] ${x.f.slice(0,120)}\n`);if(N.playback?.reaction?.trim())out+=`  Room reaction: ${N.playback.reaction.trim()}\n`;out+='\n'}
  P.forEach(p=>{
    out+=`${p.label.toUpperCase()} — ${p.role}\n${'─'.repeat(44)}\n\n`;
    Object.values(CAPS).forEach(cap=>{
      const pn=N[cap.id]?.[p.id]||{};const pr=priorities[cap.id]?.[p.id]||{};
      out+=`${cap.h1.toUpperCase()}\n`;
      cap.qs.forEach(q=>{const n=pn[q.id];if(n?.trim())out+=`  ${pr[q.id]?'★ ':''}${q.lbl}:\n  ${n.trim().replace(/\n/g,'\n  ')}\n\n`});
      const bv=pn['belief'];if(bv?.trim())out+=`  ↔ ${bv.trim()}\n\n`;
      const vb=verbatim[cap.id]?.[p.id];if(vb?.trim())out+=`  " ${vb.trim()} "\n\n`;
    });
    const sig=N.syn?.[p.id];if(sig?.trim())out+=`POSITIONING SIGNAL\n  ${sig.trim()}\n\n`;
    out+='\n';
  });
  if(N.cross?.trim())out+=`${'═'.repeat(62)}\nCROSS-PERSONA TERRITORY\n${N.cross.trim()}\n`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'text/plain'}));a.download=`Intel-Workshop-${new Date().toISOString().slice(0,10)}.txt`;a.click();URL.revokeObjectURL(a.href);
}

// ── AUTO-SYNTHESIS FROM NOTES ─────────────────────────────────────────────────
function synthesiseFromNotes(){
  // Helper: collect all non-empty notes for a given section + question, sorted by persona
  function collect(sid, qids){
    const out=[];
    P.slice(0,4).forEach(p=>{
      qids.forEach(qid=>{
        const v=(N[sid]?.[p.id]?.[qid]||'').trim();
        if(v) out.push({p:p.label,v,starred:!!(priorities[sid]?.[p.id]?.[qid])});
      });
    });
    out.sort((a,b)=>(b.starred?1:0)-(a.starred?1:0));
    return out;
  }
  function lines(items){ return items.map(x=>`${x.starred?'★ ':''}${x.p}: ${x.v}`).join('\n\n'); }
  function vbLines(){ return P.slice(0,4).flatMap(p=>['cs','wc'].map(sid=>{const v=(verbatim[sid]?.[p.id]||'').trim();return v?`${p.label}: "${v}"`:null})).filter(Boolean).join('\n\n'); }

  // What they told us about today — friction, beliefs, gaps
  const friction   = collect('cs',['q1']);
  const beliefs_cs = collect('cs',['q2']);
  const gaps       = collect('cs',['q3']);
  const sectors_cs = collect('cs',['sector']);

  // What changes — behaviour, confidence, new capabilities, belief shifts
  const shift      = collect('wc',['q1']);
  const confidence = collect('wc',['q2']);
  const caps       = collect('wc',['q3']);
  const sectors_wc = collect('wc',['sector']);
  const proofs     = collect('wc',['proof']).concat(collect('cs',['proof']));

  const beliefShifts=P.slice(0,4).map(p=>{const v=(N.wc?.[p.id]?.belief||'').trim();return v?`${p.label}: ${v}`:null}).filter(Boolean);
  const vbAll=vbLines();

  const total=[...friction,...beliefs_cs,...gaps,...shift,...confidence,...caps].length;
  if(total===0){alert('Nothing captured yet in Current State or What Changes. Add notes in those sections first.');return;}

  // ── FRAME 01: The current reality ──────────────────────────────────────────
  const f1Parts=[];
  if(friction.length)  f1Parts.push('FRICTION & WORKFLOW\n'+lines(friction));
  if(beliefs_cs.length)f1Parts.push('CURRENT BELIEFS ABOUT FRAUD\n'+lines(beliefs_cs));
  if(gaps.length)      f1Parts.push('INFORMATION GAPS & CONFIDENCE\n'+lines(gaps));
  if(sectors_cs.length)f1Parts.push('SECTOR DIFFERENCES\n'+lines(sectors_cs));

  // ── FRAME 02: What Intel changes ────────────────────────────────────────────
  const f2Parts=[];
  if(shift.length)     f2Parts.push('BEHAVIOUR SHIFT\n'+lines(shift));
  if(confidence.length)f2Parts.push('CONFIDENCE SHIFT\n'+lines(confidence));
  if(caps.length)      f2Parts.push('NEW CAPABILITIES\n'+lines(caps));
  if(sectors_wc.length)f2Parts.push('SECTOR DIFFERENCES\n'+lines(sectors_wc));
  if(vbAll)            f2Parts.push('VERBATIM FROM THE ROOM\n'+vbAll);

  // ── FRAME 03: The territory ─────────────────────────────────────────────────
  const f3Parts=[];
  if(beliefShifts.length)f3Parts.push('BELIEF SHIFTS\n'+beliefShifts.join('\n\n'));
  if(proofs.length)      f3Parts.push('PROOF POINTS & EVIDENCE\n'+lines(proofs));
  if(!f3Parts.length){
    // Fallback — pull starred items from both sections
    const starred=[...friction,...beliefs_cs,...gaps,...shift,...confidence,...caps].filter(x=>x.starred);
    if(starred.length) f3Parts.push('PRIORITY CAPTURES\n'+lines(starred));
    else f3Parts.push('EMERGING TERRITORY\n'+lines([...shift,...confidence].slice(0,4)));
  }

  const placeholder='[Nothing captured here yet]';
  N.playback.frames=[
    f1Parts.length?f1Parts.join('\n\n──────────────────────────────\n\n'):placeholder,
    f2Parts.length?f2Parts.join('\n\n──────────────────────────────\n\n'):placeholder,
    f3Parts.length?f3Parts.join('\n\n──────────────────────────────\n\n'):placeholder,
  ];
  persist();
  document.querySelectorAll('.pb-frame-ta').forEach((ta,i)=>{ta.value=N.playback.frames[i]||'';autoResize(ta);});
}

// ── STICKY NOTES ─────────────────────────────────────────────────────────────
let stickyColor='#FFE566', _sd=null;
if(!N.stickies)N.stickies=[];
try{const sv=localStorage.getItem('vi_sk');if(sv)N.stickies=JSON.parse(sv)}catch(e){}

function toggleStickyPanel(){
  const p=document.getElementById('sticky-panel');
  const b=document.getElementById('sticky-toggle-btn');
  p.classList.toggle('open');
  b.classList.toggle('on');
}

function selectColor(c,el){
  stickyColor=c;
  document.querySelectorAll('.sticky-swatch').forEach(s=>s.classList.remove('sel'));
  el.classList.add('sel');
}

function addSticky(){
  const id='sk_'+Date.now();
  // Place near centre, offset each one slightly
  const offset=N.stickies.length*22;
  const x=Math.min(window.innerWidth-190, Math.max(20, 300+offset));
  const y=Math.min(window.innerHeight-180, Math.max(70, 140+offset));
  N.stickies.push({id,text:'',color:stickyColor,x,y});
  saveStickies();
  // Add just this note to the layer
  const layer=document.getElementById('sticky-layer');
  if(layer){
    const el=document.createElement('div');
    el.innerHTML=stickyHTML({id,text:'',color:stickyColor,x,y});
    layer.appendChild(el.firstElementChild);
  }
  setTimeout(()=>document.getElementById('sta_'+id)?.focus(),50);
}

function stickyHTML(s){
  return`<div class="sticky-note" data-sid="${s.id}" style="left:${s.x}px;top:${s.y}px;background:${s.color};pointer-events:all">
    <div class="sticky-note-bar" onmousedown="stickyDragStart(event,'${s.id}')">
      <span class="sticky-note-dots">&#8942;&#8942;&#8942;</span>
      <button class="sticky-note-del" onmousedown="event.stopPropagation()" onclick="deleteSticky('${s.id}')">&#215;</button>
    </div>
    <textarea class="sticky-note-ta" id="sta_${s.id}" placeholder="Type here..." oninput="updateStickyText('${s.id}',this.value)">${s.text||''}</textarea>
  </div>`;
}

function renderStickies(){
  const layer=document.getElementById('sticky-layer');
  if(!layer)return;
  layer.innerHTML=N.stickies.map(stickyHTML).join('');
}

function stickyDragStart(e,id){
  if(e.target.tagName==='BUTTON')return;
  const el=document.querySelector(`[data-sid="${id}"]`);
  if(!el)return;
  const r=el.getBoundingClientRect();
  _sd={id,ox:e.clientX-r.left,oy:e.clientY-r.top};
  el.style.boxShadow='6px 8px 24px rgba(0,0,0,0.65)';
  el.style.zIndex='600';
  e.preventDefault();
}

document.addEventListener('mousemove',e=>{
  if(!_sd)return;
  const el=document.querySelector(`[data-sid="${_sd.id}"]`);
  if(!el)return;
  const x=Math.max(0,Math.min(window.innerWidth-180,e.clientX-_sd.ox));
  const y=Math.max(60,Math.min(window.innerHeight-160,e.clientY-_sd.oy));
  el.style.left=x+'px';el.style.top=y+'px';
});

document.addEventListener('mouseup',e=>{
  if(!_sd)return;
  const el=document.querySelector(`[data-sid="${_sd.id}"]`);
  if(el){
    el.style.boxShadow='3px 5px 16px rgba(0,0,0,0.5)';el.style.zIndex='450';
    const s=N.stickies.find(s=>s.id===_sd.id);
    if(s){s.x=parseInt(el.style.left);s.y=parseInt(el.style.top);}
    saveStickies();
  }
  _sd=null;
});

function deleteSticky(id){
  N.stickies=N.stickies.filter(s=>s.id!==id);
  document.querySelector(`[data-sid="${id}"]`)?.remove();
  saveStickies();
}

function clearStickies(){
  if(!N.stickies.length)return;
  if(!confirm('Remove all '+N.stickies.length+' notes?'))return;
  N.stickies=[];saveStickies();
  const layer=document.getElementById('sticky-layer');
  if(layer)layer.innerHTML='';
}

function updateStickyText(id,val){
  const s=N.stickies.find(s=>s.id===id);
  if(s){s.text=val;saveStickies();}
}

function saveStickies(){
  try{localStorage.setItem('vi_sk',JSON.stringify(N.stickies))}catch(e){}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Show last-saved time on load
window.addEventListener('load',()=>{
  const ts=getLastSaved();
  const el=document.getElementById('save-status');
  if(ts&&el)el.textContent='Last saved '+ts;
  renderStickies();
});

// Warn before leaving if notes exist
window.addEventListener('beforeunload',e=>{
  const hasNotes=Object.values(CAPS).some(cap=>
    P.some(p=>cap.qs.some(q=>(N[cap.id]?.[p.id]?.[q.id]||'').trim()))
  );
  if(hasNotes){
    e.preventDefault();
    e.returnValue='You have workshop notes. Export them first or they\'ll be saved in this browser.';
    return e.returnValue;
  }
});

render();
</script>
